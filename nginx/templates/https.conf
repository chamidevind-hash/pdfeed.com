map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

upstream backend_api {
    server backend:4000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name convert.getqrly.com;

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name convert.getqrly.com;

    ssl_certificate /etc/letsencrypt/live/convert.getqrly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/convert.getqrly.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:FileConvertSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 510m;

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://backend_api;
        include /etc/nginx/file-convert-templates/proxy-headers.conf;
    }

    location / {
        proxy_pass http://frontend_app;
        include /etc/nginx/file-convert-templates/proxy-headers.conf;
    }
}
